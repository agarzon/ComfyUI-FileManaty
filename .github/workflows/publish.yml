name: Publish to ComfyUI Registry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      COMFY_API_KEY: ${{ secrets.COMFY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish to ComfyUI Registry
        # Skips cleanly if the COMFY_API_KEY secret isn't configured yet.
        if: env.COMFY_API_KEY != ''
        run: |
          pip install comfy-cli
          comfy node publish --token "$COMFY_API_KEY"
